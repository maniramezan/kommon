name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PR branches, but never on main: a cancelled main run reports
  # conclusion != success, which would skip the release-please workflow and stall a release.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          # The Gradle daemon is pinned to JDK 21 (gradle/gradle-daemon-jvm.properties);
          # Robolectric instrumenting against SDK 36 also requires it.
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6

      - name: Check (tests, detekt, ktlint, lint, coverage gate)
        run: ./gradlew check

      - name: Build API docs
        run: ./gradlew dokkaGenerate

      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: reports
          path: |
            **/build/reports/**
            build/dokka/html/**
