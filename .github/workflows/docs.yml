name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6

      - name: Build aggregated API docs
        run: ./gradlew dokkaGenerate

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/dokka/html

      # actions/deploy-pages occasionally fails with a transient "Deployment
      # failed, try again later" from GitHub's Pages API even with no real
      # concurrency (observed in practice on this repo). Retry once after a
      # short backoff before giving up.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Back off before retrying the Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail the job if every deploy attempt failed
        if: always() && steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: exit 1
